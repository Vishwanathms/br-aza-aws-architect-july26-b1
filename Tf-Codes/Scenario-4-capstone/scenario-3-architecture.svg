<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="40" y="40" width="1320" height="820" rx="24" fill="white" stroke="#dbeafe" stroke-width="2"/>

  <text x="70" y="95" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Scenario 3 - AWS Architecture</text>
  <text x="70" y="128" font-family="Arial, sans-serif" font-size="16" fill="#475569">Public EC2 + Private Auto Scaling Group + Application Load Balancer</text>

  <!-- Internet -->
  <rect x="110" y="180" width="140" height="70" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Internet</text>
  <text x="180" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Users / Browser</text>

  <!-- ALB -->
  <rect x="330" y="180" width="220" height="90" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">Application</text>
  <text x="440" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">Load Balancer</text>

  <!-- VPC -->
  <rect x="620" y="120" width="680" height="640" rx="24" fill="#f8fafc" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
  <text x="650" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">VPC</text>
  <text x="650" y="188" font-family="Arial, sans-serif" font-size="15" fill="#64748b">10.0.0.0/16</text>

  <!-- IGW and NAT -->
  <rect x="670" y="205" width="150" height="70" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="745" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">Internet Gateway</text>

  <rect x="860" y="205" width="140" height="70" rx="16" fill="#dcfce7" stroke="#34d399" stroke-width="2"/>
  <text x="930" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">NAT Gateway</text>

  <!-- Public subnets -->
  <rect x="670" y="310" width="280" height="220" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="690" y="345" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">Public Subnet A</text>
  <text x="690" y="370" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.0.0/24</text>

  <rect x="980" y="310" width="280" height="220" rx="20" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="1000" y="345" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">Public Subnet B</text>
  <text x="1000" y="370" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.1.0/24</text>

  <!-- Private subnets -->
  <rect x="670" y="560" width="280" height="160" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="690" y="595" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">Private Subnet A</text>
  <text x="690" y="620" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.2.0/24</text>

  <rect x="980" y="560" width="280" height="160" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="1000" y="595" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">Private Subnet B</text>
  <text x="1000" y="620" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.3.0/24</text>

  <!-- Public EC2 -->
  <rect x="720" y="395" width="180" height="90" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="760" cy="440" r="16" fill="#2563eb"/>
  <text x="790" y="432" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">EC2</text>
  <text x="790" y="452" font-family="Arial, sans-serif" font-size="13" fill="#334155">Public Web Tier</text>

  <!-- ASG -->
  <rect x="1030" y="395" width="200" height="110" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="1130" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">Auto Scaling Group</text>
  <text x="1130" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Min 1 • Desired 1 • Max 2</text>
  <text x="1130" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">CPU Target: 70%</text>

  <!-- EC2 instances inside ASG area -->
  <rect x="720" y="620" width="160" height="70" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <circle cx="760" cy="655" r="12" fill="#16a34a"/>
  <text x="785" y="648" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">App EC2</text>
  <text x="785" y="665" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Private A</text>

  <rect x="910" y="620" width="160" height="70" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <circle cx="950" cy="655" r="12" fill="#16a34a"/>
  <text x="975" y="648" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#166534">App EC2</text>
  <text x="975" y="665" font-family="Arial, sans-serif" font-size="12" fill="#4b5563">Private B</text>

  <!-- Arrows -->
  <line x1="250" y1="215" x2="330" y2="215" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="550" y1="215" x2="620" y2="215" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="820" y1="215" x2="860" y2="215" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="930" y1="275" x2="930" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="485" x2="1030" y2="450" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1130" y1="505" x2="1130" y2="560" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="270" x2="440" y2="400" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="440" y1="400" x2="720" y2="440" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="80" y="760" width="1240" height="70" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="110" y="792" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Flow Summary</text>
  <text x="220" y="792" font-family="Arial, sans-serif" font-size="15" fill="#475569">Internet → ALB → Target Group → Auto Scaling Group → Private EC2 instances</text>
  <text x="910" y="792" font-family="Arial, sans-serif" font-size="15" fill="#475569">Public EC2 remains in Public Subnet A</text>
</svg>
