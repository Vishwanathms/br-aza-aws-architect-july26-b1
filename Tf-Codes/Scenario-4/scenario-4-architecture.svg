<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="30" y="30" width="1540" height="940" rx="24" fill="white" stroke="#dbeafe" stroke-width="2"/>
  <text x="70" y="95" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Scenario-4: 3-Tier Application Architecture</text>
  <text x="70" y="128" font-family="Arial, sans-serif" font-size="17" fill="#475569">Modular Terraform deployment with VPC networking, ALB, Nginx ASG, Python app, and Redis</text>

  <!-- Internet -->
  <rect x="90" y="190" width="140" height="80" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Internet</text>
  <text x="160" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Users</text>

  <!-- ALB -->
  <rect x="310" y="180" width="220" height="100" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">Application</text>
  <text x="420" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#92400e">Load Balancer</text>

  <!-- VPC -->
  <rect x="600" y="120" width="900" height="760" rx="26" fill="#f8fafc" stroke="#2563eb" stroke-width="3" filter="url(#shadow)"/>
  <text x="635" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">VPC</text>
  <text x="635" y="192" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.0.0/16</text>

  <!-- Public zone -->
  <rect x="640" y="225" width="360" height="240" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
  <text x="670" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">Public Subnets</text>
  <text x="670" y="286" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.0.0/24 • 10.0.1.0/24</text>
  <rect x="700" y="310" width="180" height="95" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="790" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">ALB</text>
  <text x="790" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#334155">Public Tier</text>

  <!-- Private app zone -->
  <rect x="1040" y="225" width="430" height="240" rx="22" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="1070" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#15803d">Private Application Subnets</text>
  <text x="1070" y="286" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.2.0/24 • 10.0.3.0/24</text>
  <rect x="1085" y="310" width="180" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="1175" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Nginx ASG</text>
  <text x="1175" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Min 1 • Desired 1 • Max 3</text>
  <text x="1175" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">CPU 70%</text>
  <rect x="1290" y="310" width="150" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1365" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#166534">Python App</text>
  <text x="1365" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">EC2 Instance</text>
  <text x="1365" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Port 5000</text>

  <!-- DB zone -->
  <rect x="640" y="530" width="830" height="260" rx="22" fill="#fefce8" stroke="#fde68a" stroke-width="2"/>
  <text x="670" y="565" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b45309">Database Subnets</text>
  <text x="670" y="590" font-family="Arial, sans-serif" font-size="14" fill="#64748b">10.0.4.0/24 • 10.0.5.0/24</text>
  <rect x="975" y="605" width="220" height="120" rx="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="1085" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">Redis DB</text>
  <text x="1085" y="664" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">EC2 Instance</text>
  <text x="1085" y="684" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Port 6379</text>

  <!-- Extra network elements -->
  <rect x="720" y="620" width="180" height="90" rx="16" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="810" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">NAT Gateway</text>

  <!-- Arrows -->
  <line x1="230" y1="230" x2="310" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="530" y1="230" x2="700" y2="340" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="357" x2="1085" y2="357" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1265" y1="357" x2="1290" y2="357" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1365" y1="430" x2="1085" y2="605" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="810" y1="620" x2="810" y2="405" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="70" y="900" width="1460" height="55" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="95" y="932" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">Flow</text>
  <text x="145" y="932" font-family="Arial, sans-serif" font-size="15" fill="#475569">Internet → ALB → Nginx ASG → Python App → Redis DB</text>
  <text x="1080" y="932" font-family="Arial, sans-serif" font-size="15" fill="#475569">Public and database layers are isolated by subnets and security groups</text>
</svg>
